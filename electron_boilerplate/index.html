<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro App Electron</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Validador de Nota Escolar</h1>
        <p class="descricao">Insira os dados do estudante abaixo para verificar a situação acadêmica.</p>

        <div class="formulario">
            <div class="campo">
                <label for="nome">Nome do Aluno:</label>
                <input type="text" id="nome" placeholder="Digite o nome..." required>
            </div>

            <div class="campo">
                <label for="nota">Nota (0 a 10):</label>
                <input type="number" id="nota" min="0" max="10" step="0.1" placeholder="Ex: 7.5" required>
            </div>

            <button id="btnVerificar">Verificar Situação</button>
        </div>

        <div class="resultado-container">
            <h2>Resultado:</h2>
            <p id="resultado">Aguardando verificação...</p>
        </div>
    </div>

    <!-- Script que controla a lógica do aplicativo -->
    <script src="renderer.js"></script>
</body>
</html>
